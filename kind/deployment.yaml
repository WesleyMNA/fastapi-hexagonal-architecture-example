apiVersion: apps/v1
kind: Deployment
metadata:
  name: hexagonal-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hexagonal-api
  template:
    metadata:
      labels:
        app: hexagonal-api
    spec:
      containers:
        - name: hexagonal-api
          image: wesleymna/fastapi-hexagonal-architecture-example:latest
          ports:
            - containerPort: 8000
          env:
            - name: DB_HOST
              value: "192.168.15.34"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"